name: Release Auto Update

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target to publish"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - linux
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-autoupdate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'windows' }}
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Validate GH_TOKEN
        shell: pwsh
        run: |
          if (-not $env:GH_TOKEN) {
            Write-Error "GH_TOKEN secret is required to publish release assets."
            exit 1
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build app
        run: pnpm build

      - name: Publish Windows NSIS (x64)
        run: pnpm eb --win nsis --x64 --publish always

  release-linux:
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'linux' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Validate GH_TOKEN
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GH_TOKEN secret is required to publish release assets."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build app
        run: pnpm build

      - name: Publish Linux AppImage (x64)
        run: pnpm eb --linux AppImage --x64 --publish always

  sync-release-notes:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - release-windows
      - release-linux
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate GH_TOKEN
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GH_TOKEN secret is required to sync release notes."
            exit 1
          fi

      - name: Build release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY_FILE="/tmp/release-notes-body.md"
          NOTES_FILE="/tmp/release-notes.md"

          if ! grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md sem secao da versao [${VERSION}]. Adicione o bloco antes de criar/push da tag."
            exit 1
          fi

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { in_section=1; next }
            in_section && $0 ~ "^## \\[" { exit }
            in_section { print }
          ' CHANGELOG.md > "$BODY_FILE"

          sed -i '/./,$!d' "$BODY_FILE"

          if [ ! -s "$BODY_FILE" ]; then
            echo "::error::Secao [${VERSION}] encontrada no CHANGELOG.md, mas sem conteudo. Inclua pelo menos um item de release notes."
            exit 1
          fi

          {
            echo "v${VERSION}"
            echo
            cat "$BODY_FILE"
          } > "$NOTES_FILE"

      - name: Sync GitHub release title and notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release edit "${GITHUB_REF_NAME}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md
