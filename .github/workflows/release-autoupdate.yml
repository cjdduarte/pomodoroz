name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish assets to (ex: v26.4.17)"
        required: true
        type: string
      target:
        description: "Target to publish"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - linux

permissions:
  contents: write

concurrency:
  group: release-autoupdate-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release-windows:
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'windows' }}
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Validate required secrets
        shell: pwsh
        run: |
          if (-not $env:GH_TOKEN) {
            Write-Error "GH_TOKEN secret is required."
            exit 1
          }
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY secret is required."
            exit 1
          }
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is required."
            exit 1
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri NSIS (x64)
        run: pnpm tauri build --bundles nsis

      - name: Build release notes from CHANGELOG.md
        shell: pwsh
        run: |
          $tag = "$env:RELEASE_TAG"
          $version = $tag -replace '^v', ''
          $escapedVersion = [regex]::Escape($version)
          $versionHeaderPattern = "^## \[$escapedVersion\] - "
          $capture = $false
          $done = $false
          $bodyLines = New-Object System.Collections.Generic.List[string]

          Get-Content -Path "CHANGELOG.md" | ForEach-Object {
            if ($done) {
              return
            }

            $line = $_
            if (-not $capture) {
              if ($line -match $versionHeaderPattern) {
                $capture = $true
              }
              return
            }

            if ($line -match '^## \[') {
              $done = $true
              return
            }

            $bodyLines.Add($line)
          }

          if (-not $capture) {
            Write-Error "Missing changelog section for version [$version] in CHANGELOG.md."
            exit 1
          }

          $notes = ($bodyLines -join [Environment]::NewLine).Trim()
          if ([string]::IsNullOrWhiteSpace($notes)) {
            Write-Error "Changelog section [$version] in CHANGELOG.md is empty."
            exit 1
          }

          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes-$version.md"
          Set-Content -Path $notesPath -Value $notes -Encoding utf8
          "RELEASE_NOTES_FILE=$notesPath" >> $env:GITHUB_ENV

      - name: Ensure release exists
        shell: pwsh
        run: |
          $tag = "$env:RELEASE_TAG"
          $notesFile = "$env:RELEASE_NOTES_FILE"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes-file $notesFile
          } else {
            gh release edit $tag --notes-file $notesFile
          }

      - name: Upload Tauri Windows updater assets
        shell: pwsh
        run: |
          $tag = "$env:RELEASE_TAG"
          $files = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -File |
            Where-Object { $_.Extension -in @(".exe", ".sig", ".zip") } |
            ForEach-Object { $_.FullName }

          if (-not $files -or $files.Count -eq 0) {
            Write-Error "No Tauri Windows assets found under src-tauri/target/release/bundle."
            exit 1
          }

          $files | ForEach-Object { Write-Host "Uploading: $_" }
          gh release upload $tag @files --clobber

  release-linux:
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'linux' }}
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            desktop-file-utils \
            libfuse2t64 \
            gstreamer1.0-tools \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libgstreamer1.0-0 \
            libgstreamer-plugins-base1.0-0 \
            binutils \
            squashfs-tools \
            zsync

      - name: Validate required secrets
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GH_TOKEN secret is required."
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is required."
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is required."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare AppImage environment (robust mode)
        shell: bash
        run: |
          echo "NO_STRIP=1" >> "$GITHUB_ENV"
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

          if command -v pkgconf >/dev/null 2>&1; then
            GDK_BINARY_DIR="$(pkgconf --variable=gdk_pixbuf_binarydir gdk-pixbuf-2.0 2>/dev/null || true)"
            GDK_BINARY_VERSION="$(pkgconf --variable=gdk_pixbuf_binary_version gdk-pixbuf-2.0 2>/dev/null || true)"
            GDK_PC_PATH="$(pkgconf --path gdk-pixbuf-2.0 2>/dev/null || true)"

            if [ -n "${GDK_BINARY_DIR}" ] && [ ! -d "${GDK_BINARY_DIR}" ] && [ -n "${GDK_PC_PATH}" ] && [ -f "${GDK_PC_PATH}" ]; then
              FIX_DIR="$(mktemp -d /tmp/pomodoroz-gh-appimage-gdkpixbuf.XXXXXX)"
              GDK_BINARY_VERSION="${GDK_BINARY_VERSION:-2.10.0}"
              FIX_BINARY_DIR="${FIX_DIR}/gdk-pixbuf-2.0/${GDK_BINARY_VERSION}"

              mkdir -p "${FIX_DIR}/pkgconfig" "${FIX_BINARY_DIR}/loaders"
              cp "${GDK_PC_PATH}" "${FIX_DIR}/pkgconfig/gdk-pixbuf-2.0.pc"

              sed -i "s|^gdk_pixbuf_binarydir=.*|gdk_pixbuf_binarydir=${FIX_BINARY_DIR}|" "${FIX_DIR}/pkgconfig/gdk-pixbuf-2.0.pc"
              sed -i 's|^gdk_pixbuf_moduledir=.*|gdk_pixbuf_moduledir=${gdk_pixbuf_binarydir}/loaders|' "${FIX_DIR}/pkgconfig/gdk-pixbuf-2.0.pc"
              sed -i 's|^gdk_pixbuf_cache_file=.*|gdk_pixbuf_cache_file=${gdk_pixbuf_binarydir}/loaders.cache|' "${FIX_DIR}/pkgconfig/gdk-pixbuf-2.0.pc"

              if command -v gdk-pixbuf-query-loaders >/dev/null 2>&1; then
                gdk-pixbuf-query-loaders > "${FIX_BINARY_DIR}/loaders.cache"
              fi

              echo "PKG_CONFIG_PATH=${FIX_DIR}/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
              echo "AppImage workaround enabled: ${FIX_BINARY_DIR}"
            fi
          fi

      - name: Probe AppImage toolchain binaries
        run: |
          set -euo pipefail
          mkdir -p /tmp/pomodoroz-appimage-tools
          cd /tmp/pomodoroz-appimage-tools

          curl -fsSL -o linuxdeploy-x86_64.AppImage \
            https://github.com/tauri-apps/binary-releases/releases/download/linuxdeploy/linuxdeploy-x86_64.AppImage
          curl -fsSL -o linuxdeploy-plugin-appimage-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage

          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-appimage-x86_64.AppImage

          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage --version
          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-plugin-appimage-x86_64.AppImage --plugin-type
          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-plugin-appimage-x86_64.AppImage --plugin-api-version

      - name: Build Tauri AppImage (x64)
        run: |
          set -o pipefail
          for attempt in 1 2 3; do
            LOG_FILE="/tmp/tauri-appimage-build-attempt-${attempt}.log"
            echo "AppImage build attempt ${attempt}/3"
            if RUST_LOG=tauri_bundler=trace,tauri_cli=debug pnpm tauri build --bundles appimage -vv 2>&1 | tee "${LOG_FILE}"; then
              exit 0
            fi

            echo "AppImage build failed (attempt ${attempt})."
            echo "Last 200 log lines:"
            tail -n 200 "${LOG_FILE}" || true
            echo "Filtered linuxdeploy/appimage error lines:"
            grep -Eni "linuxdeploy|appimage|error|failed|what\\(\\)|subprocess" "${LOG_FILE}" | tail -n 120 || true

            if [ "${attempt}" -lt 3 ]; then
              echo "AppImage build failed (attempt ${attempt}); retrying in 20s..."
              sleep 20
            fi
          done

          echo "AppImage build failed after 3 attempts."
          exit 1

      - name: Build release notes from CHANGELOG.md
        run: |
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes-${VERSION}.md"

          awk -v version="${VERSION}" '
            $0 ~ ("^## \\[" version "\\] - ") { in_section=1; next }
            in_section && $0 ~ /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > "${NOTES_FILE}"

          if [ ! -s "${NOTES_FILE}" ]; then
            echo "Missing or empty changelog section for version [${VERSION}] in CHANGELOG.md."
            exit 1
          fi

          echo "RELEASE_NOTES_FILE=${NOTES_FILE}" >> "$GITHUB_ENV"

      - name: Ensure release exists
        run: |
          TAG="${RELEASE_TAG}"
          NOTES_FILE="${RELEASE_NOTES_FILE}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" --title "${TAG}" --notes-file "${NOTES_FILE}"
          else
            gh release edit "${TAG}" --notes-file "${NOTES_FILE}"
          fi

      - name: Upload Tauri Linux updater assets
        run: |
          TAG="${RELEASE_TAG}"
          mapfile -t FILES < <(find src-tauri/target/release/bundle -type f \( -name "*.AppImage" -o -name "*.AppImage.tar.gz" -o -name "*.sig" \))
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No Tauri Linux assets found under src-tauri/target/release/bundle."
            exit 1
          fi

          printf 'Uploading: %s\n' "${FILES[@]}"
          gh release upload "${TAG}" "${FILES[@]}" --clobber

  sync-latest-json:
    needs:
      - release-windows
      - release-linux
    if: >-
      ${{
        always() &&
        (
          (github.event_name == 'push' &&
            needs.release-windows.result == 'success' &&
            needs.release-linux.result == 'success') ||
          (github.event_name == 'workflow_dispatch' &&
            (
              (github.event.inputs.target == 'all' &&
                needs.release-windows.result == 'success' &&
                needs.release-linux.result == 'success') ||
              (github.event.inputs.target == 'windows' &&
                needs.release-windows.result == 'success') ||
              (github.event.inputs.target == 'linux' &&
                needs.release-linux.result == 'success')
            ))
        )
      }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Validate GH_TOKEN
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GH_TOKEN secret is required."
            exit 1
          fi

      - name: Build merged latest.json
        run: |
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          RELEASE_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")"
          DOWNLOAD_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          echo "Release assets found for ${TAG}:"
          echo "${RELEASE_JSON}" | jq -r '.assets[].name' | sed 's/^/ - /'

          add_platform() {
            local asset_name="$1"
            local platform_key="$2"
            local sig_asset="${asset_name}.sig"
            local sig_asset_id
            local signature

            sig_asset_id="$(echo "${RELEASE_JSON}" | jq -r --arg NAME "${sig_asset}" '.assets[] | select(.name == $NAME) | .id' | head -n1)"
            if [ -z "${sig_asset_id}" ] || [ "${sig_asset_id}" = "null" ]; then
              echo "Missing signature asset ${sig_asset} for ${asset_name}."
              return 1
            fi

            signature="$(gh api "repos/${GITHUB_REPOSITORY}/releases/assets/${sig_asset_id}" -H "Accept: application/octet-stream" | tr -d '\r\n')"
            if [ -z "${signature}" ]; then
              echo "Empty signature payload for ${sig_asset}."
              return 1
            fi

            LATEST_JSON="$(echo "${LATEST_JSON}" | jq --arg KEY "${platform_key}" --arg URL "${DOWNLOAD_BASE}/${asset_name}" --arg SIG "${signature}" '.platforms[$KEY] = { url: $URL, signature: $SIG }')"
            return 0
          }

          LATEST_JSON="$(jq -n --arg VERSION "${VERSION}" --arg PUB_DATE "${PUB_DATE}" '{ version: $VERSION, notes: "", pub_date: $PUB_DATE, platforms: {} }')"

          WINDOWS_UPDATER="$(echo "${RELEASE_JSON}" | jq -r '
            [.assets[].name] as $names
            | .assets[]
            | . as $asset
            | select($asset.name | test("\\.exe\\.zip$"))
            | select(($names | index($asset.name + ".sig")) != null)
            | $asset.name
          ' | head -n1)"
          if [ -z "${WINDOWS_UPDATER}" ] || [ "${WINDOWS_UPDATER}" = "null" ]; then
            WINDOWS_UPDATER="$(echo "${RELEASE_JSON}" | jq -r '
              [.assets[].name] as $names
              | .assets[]
              | . as $asset
              | select($asset.name | test("\\.exe$"))
              | select(($names | index($asset.name + ".sig")) != null)
              | $asset.name
            ' | head -n1)"
          fi
          if [ -n "${WINDOWS_UPDATER}" ] && [ "${WINDOWS_UPDATER}" != "null" ]; then
            add_platform "${WINDOWS_UPDATER}" "windows-x86_64"
            add_platform "${WINDOWS_UPDATER}" "windows-x86_64-nsis"
          fi

          LINUX_UPDATER="$(echo "${RELEASE_JSON}" | jq -r '
            [.assets[].name] as $names
            | .assets[]
            | . as $asset
            | select($asset.name | test("\\.AppImage\\.tar\\.gz$"))
            | select(($names | index($asset.name + ".sig")) != null)
            | $asset.name
          ' | head -n1)"
          if [ -z "${LINUX_UPDATER}" ] || [ "${LINUX_UPDATER}" = "null" ]; then
            LINUX_UPDATER="$(echo "${RELEASE_JSON}" | jq -r '
              [.assets[].name] as $names
              | .assets[]
              | . as $asset
              | select($asset.name | test("\\.AppImage$"))
              | select(($names | index($asset.name + ".sig")) != null)
              | $asset.name
            ' | head -n1)"
          fi
          if [ -n "${LINUX_UPDATER}" ] && [ "${LINUX_UPDATER}" != "null" ]; then
            add_platform "${LINUX_UPDATER}" "linux-x86_64"
            add_platform "${LINUX_UPDATER}" "linux-x86_64-appimage"
          fi

          PLATFORM_COUNT="$(echo "${LATEST_JSON}" | jq '.platforms | length')"
          if [ "${PLATFORM_COUNT}" -eq 0 ]; then
            echo "No updater platforms were generated for latest.json."
            exit 1
          fi

          echo "${LATEST_JSON}" | jq '.' > latest.json
          cat latest.json

      - name: Upload merged latest.json
        run: |
          TAG="${RELEASE_TAG}"
          gh release upload "${TAG}" latest.json --clobber --repo "${GITHUB_REPOSITORY}"
