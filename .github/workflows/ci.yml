name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@11.5.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck renderer
        run: pnpm typecheck:renderer

      - name: Test renderer
        run: pnpm test:run

      - name: Build renderer
        run: pnpm build:renderer

  frontend-quality-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@11.5.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck renderer
        run: pnpm typecheck:renderer

      - name: Test renderer
        run: pnpm test:run

      - name: Build renderer
        run: pnpm build:renderer

  tauri-rust-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
  tauri-rust-check-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  tauri-rust-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        # --deny warnings faz o CI falhar em QUALQUER advisory novo (vuln ou
        # unmaintained/unsound) que nao esteja na ignore-list de audit.toml.
        # Sem --no-fetch: o runner do CI e' limpo e precisa baixar a
        # advisory-db; --no-fetch so vale offline com a base ja em cache.
        run: cargo audit --deny warnings
        working-directory: src-tauri

