# Configuracao do cargo-audit (https://github.com/rustsec/rustsec/tree/main/cargo-audit)
#
# Politica: o CI (job tauri-rust-audit) deve falhar apenas em problemas NOVOS.
# Os advisories abaixo sao avisos (unmaintained/unsound) de dependencias
# TRANSITIVAS que vem do proprio stack do Tauri/GTK3 no Linux e que nao
# controlamos diretamente. Nao ha vulnerabilidade (vulnerabilities = 0).
#
# Revisar esta lista quando o Tauri migrar do GTK3 ou ao subir a major do
# Tauri; remover IDs que deixarem de aparecer em `cargo audit`.

[advisories]
ignore = [
  # gtk-rs GTK3 bindings - no longer maintained (vem via tauri/wry no Linux)
  "RUSTSEC-2024-0411", # gdkwayland-sys
  "RUSTSEC-2024-0412", # gdk
  "RUSTSEC-2024-0413", # atk
  "RUSTSEC-2024-0414", # gdkx11-sys
  "RUSTSEC-2024-0415", # gtk
  "RUSTSEC-2024-0416", # atk-sys
  "RUSTSEC-2024-0417", # gdkx11
  "RUSTSEC-2024-0418", # gdk-sys
  "RUSTSEC-2024-0419", # gtk3-macros
  "RUSTSEC-2024-0420", # gtk-sys
  # outros avisos de transitivas sem fix disponivel
  "RUSTSEC-2024-0370", # proc-macro-error - unmaintained
  "RUSTSEC-2024-0429", # glib - unsound (Iterator soundness)
  "RUSTSEC-2025-0075", # unic-char-range - unmaintained
  "RUSTSEC-2025-0080", # unic-common - unmaintained
  "RUSTSEC-2025-0081", # unic-char-property - unmaintained
  "RUSTSEC-2025-0098", # unic-ucd-version - unmaintained
  "RUSTSEC-2025-0100", # unic-ucd-ident - unmaintained
]
